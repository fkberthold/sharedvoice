  - {id: morning-community, start: 48.5}
  - {id: my-path, start: 80.0}
  - {id: motivational, start: 119.5}
  - {id: five-remembrances, start: 155.0}
  - {id: mental-discipline, start: 199.5}
  - {id: abiding-on-the-breath, start: 255.0}
  - {id: altruistic, start: 283.5}
  - {id: four-gifts, start: 308.0}
