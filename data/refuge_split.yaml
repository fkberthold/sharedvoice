# Cut points that carve Ven. Tarpa's combined Refuge.mp3 recitation into
# per-affirmation root recordings (one per corpus id). Consumed by sv-lds.20.
#
# Each `start` is in SECONDS from the top of the file and includes ~0.5s of
# air BEFORE the spoken title — the cut lands before Tarpa announces the
# title, so the root carries "title (his solo) -> body (the hall joins)".
# Each segment runs to the NEXT start; the last runs to end-of-file.
#
# The mp3 itself is NOT committed (sensitive voice) — it lives in the storage
# layer. Only these numeric cut points are tracked here. Start times supplied
# by Frank, 2026-07-03.
source: Refuge.mp3
segments:
